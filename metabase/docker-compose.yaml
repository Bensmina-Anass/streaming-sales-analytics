services:
  postgres:
    image: postgres:16
    container_name: metabase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MB_APP_DB_NAME}
      POSTGRES_USER: ${MB_APP_DB_USER}
      POSTGRES_PASSWORD: ${MB_APP_DB_PASS}
    volumes:
      - ./metabase-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MB_APP_DB_USER} -d ${MB_APP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - metabase-net

  metabase:
    image: metabase/metabase:v0.56.1
    container_name: metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${MB_APP_DB_NAME}
      MB_DB_PORT: 5432
      MB_DB_USER: ${MB_APP_DB_USER}
      MB_DB_PASS: ${MB_APP_DB_PASS}
      MB_DB_HOST: postgres

      MB_SITE_URL: ${MB_SITE_URL}
      MB_ENCRYPTION_SECRET_KEY: ${MB_ENCRYPTION_SECRET_KEY}

      JAVA_TIMEZONE: ${TZ}
      TZ: ${TZ}

      MB_PLUGINS_DIR: /plugins
    volumes:
      - ./metabase-data/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"ok\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - metabase-net

networks:
  metabase-net:
    driver: bridge
