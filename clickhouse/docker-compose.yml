services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: olap_clickhouse_ml_branch
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
    ports:
      - "8124:8123"  
      - "9001:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data_ml:/var/lib/clickhouse
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_clickhouse.sql

  dw_seeder:
    build: 
      context: .  
    container_name: dw_seeder
    depends_on:
      - clickhouse
    volumes:
      - ./data/oltp:/app/data
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  clickhouse_data_ml: