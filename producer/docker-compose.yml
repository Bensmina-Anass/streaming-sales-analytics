services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka_broker
    ports:
      - "9092:9092"
    environment:
      # Native Apache KRaft Variables (No "CFG_" prefix)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # Advertises its Docker hostname so the Producer and UI can find it
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Single-node cluster settings to prevent replication crashes
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_TRANSACTION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Apache image requires a cluster ID to auto-format KRaft storage
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      # Correct data path for the official Apache image
      - kafka_data:/var/lib/kafka/data

  producer:
    build: 
      context: .  
    container_name: producer
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - kafka
    volumes:
      - ../data:/app/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_gui
    ports:
      - "6060:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=Olist-Local-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

volumes:
  kafka_data:
